<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Buddy AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; color: #ececec; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
.topbar { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #2f2f2f; gap: 10px; }
.model-name { font-size: 14px; font-weight: 600; color: #ececec; }
.model-tag { font-size: 12px; color: #888; background: #2a2a2a; padding: 2px 8px; border-radius: 10px; }
.chat-area { flex: 1; overflow-y: auto; padding: 30px 20px; display: flex; flex-direction: column; gap: 24px; max-width: 760px; width: 100%; margin: 0 auto; }
.message { display: flex; flex-direction: column; gap: 6px; }
.message.user { align-items: flex-end; }
.message.ai { align-items: flex-start; }
.bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
.message.user .bubble { background: #2f2f2f; color: #ececec; border-bottom-right-radius: 4px; }
.message.ai .bubble { background: transparent; color: #ececec; border-bottom-left-radius: 4px; padding-left: 0; }
.ai-label { font-size: 12px; color: #888; padding-left: 4px; }
.input-area { padding: 16px 20px 24px; max-width: 760px; width: 100%; margin: 0 auto; }
.input-box { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 16px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
textarea { background: transparent; border: none; outline: none; color: #ececec; font-size: 14px; resize: none; min-height: 44px; max-height: 200px; font-family: inherit; line-height: 1.5; }
textarea::placeholder { color: #555; }
.input-bottom { display: flex; justify-content: space-between; align-items: center; }
.start-btn { background: #c96a2a; color: white; border: none; padding: 8px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.start-btn:hover { background: #e07830; }
.send-btn { background: #c96a2a; color: white; border: none; width: 34px; height: 34px; border-radius: 8px; font-size: 16px; cursor: pointer; }
.send-btn:hover { background: #e07830; }
</style>
</head>
<body>
<div class="topbar">
  <span class="model-name">Linux Buddy AI</span>
  <span class="model-tag">Sonnet</span>
</div>
<div class="chat-area" id="chatArea">
  <div class="message ai">
    <span class="ai-label">Linux Buddy</span>
    <div class="bubble">Hello! I am Linux Buddy AI. Tell me what you want to do in Linux. I will guide you step by step.</div>
  </div>
</div>
<div class="input-area">
  <div class="input-box">
    <textarea id="userInput" placeholder="Describe your Linux problem or goal..." rows="2"></textarea>
    <div class="input-bottom">
      <button class="start-btn" onclick="startCLI()">Start Session</button>
      <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>
<script>
function sendMessage() {
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if (!text) return;
  var chatArea = document.getElementById('chatArea');
  var userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.innerHTML = '<div class="bubble">' + text + '</div>';
  chatArea.appendChild(userMsg);
  input.value = '';
  chatArea.scrollTop = chatArea.scrollHeight;
  fetch('/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: text})
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var aiMsg = document.createElement('div');
    aiMsg.className = 'message ai';
    aiMsg.innerHTML = '<span class="ai-label">Linux Buddy</span><div class="bubble">' + data.reply + '</div>';
    chatArea.appendChild(aiMsg);
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}
function startCLI() {
  fetch('/start', {method: 'POST'})
  .then(function() { window.close(); });
}
document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
